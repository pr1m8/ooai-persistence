name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish artifacts to PyPI"
        required: true
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  PDM_USE_UV: "false"

jobs:
  checks:
    name: Release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.13"
          cache: true
      - run: pdm install -G :all
      - name: Ensure tag matches project version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          expected="v$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as file:
              print(tomllib.load(file)["project"]["version"])
          PY
          )"
          if [[ "${GITHUB_REF_NAME}" != "${expected}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pyproject.toml version ${expected}."
            exit 1
          fi
      - run: pdm lock --check
      - run: pdm run ruff format --check src tests examples docs
      - run: pdm run ruff check src tests examples docs
      - run: pdm run pyright
      - run: pdm run pytest --cov=src/ooai_persistence --cov-report=term-missing --cov-report=xml
      - run: pdm run ooai-persistence doctor --backend postgres --json
      - run: pdm run ooai-persistence smoke --backend memory --json
      - run: pdm run ooai-persistence smoke --backend sqlite --sqlite-path .ooai/release-smoke.sqlite3 --json
      - run: LC_ALL=C.UTF-8 LANG=C.UTF-8 pdm run sphinx-build -W -b html docs docs/_build/html

  postgres-e2e:
    name: Async Postgres E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ooai_persistence
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ooai_persistence"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      OOAI_PERSISTENCE_E2E_POSTGRES: "1"
      OOAI_PERSISTENCE_INFRA__POSTGRES_ENABLED: "true"
      OOAI_PERSISTENCE_INFRA__POSTGRES_HOST: localhost
      OOAI_PERSISTENCE_INFRA__POSTGRES_PORT: "5432"
      OOAI_PERSISTENCE_INFRA__POSTGRES_DATABASE: ooai_persistence
      OOAI_PERSISTENCE_INFRA__POSTGRES_USER: postgres
      OOAI_PERSISTENCE_INFRA__POSTGRES_PASSWORD: postgres
      OOAI_PERSISTENCE_INFRA__POSTGRES_SSLMODE: disable
    steps:
      - uses: actions/checkout@v5
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.13"
          cache: true
      - run: pdm install -G :all
      - run: pdm run pytest --no-cov tests/e2e/test_postgres_bundle.py -q
      - run: pdm run ooai-persistence smoke --backend postgres --async --json

  build:
    name: Build artifacts
    runs-on: ubuntu-latest
    needs:
      - checks
      - postgres-e2e
    steps:
      - uses: actions/checkout@v5
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.13"
          cache: true
      - run: pdm install -G :all
      - run: pdm build
      - name: Validate built archives
        run: |
          python -m zipfile --test dist/*.whl
          python -m tarfile --list dist/*.tar.gz >/dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verify-metadata: true

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - publish-pypi
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist
      - name: Create release and attach artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes "Automated release for ${GITHUB_REF_NAME}."
