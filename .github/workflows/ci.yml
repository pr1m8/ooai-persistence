name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PDM_USE_UV: "false"

jobs:
  quality:
    name: Quality, typing, docs, and smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.13"
          cache: true
      - run: pdm install -G :all
      - run: pdm run ruff format --check src tests examples docs
      - run: pdm run ruff check src tests examples docs
      - run: pdm run pyright
      - run: pdm run pytest --cov=src/ooai_persistence --cov-report=term-missing --cov-report=xml
      - run: pdm run ooai-persistence doctor --backend memory --json
      - run: pdm run ooai-persistence smoke --backend memory --json
      - run: pdm run ooai-persistence smoke --backend sqlite --sqlite-path .ooai/ci-smoke.sqlite3 --json
      - run: LC_ALL=C.UTF-8 LANG=C.UTF-8 pdm run sphinx-build -W -b html docs docs/_build/html

  postgres-e2e:
    name: Postgres E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ooai_persistence
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ooai_persistence"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PDM_USE_UV: "false"
      OOAI_PERSISTENCE_E2E_POSTGRES: "1"
      OOAI_PERSISTENCE_INFRA__POSTGRES_ENABLED: "true"
      OOAI_PERSISTENCE_INFRA__POSTGRES_HOST: localhost
      OOAI_PERSISTENCE_INFRA__POSTGRES_PORT: "5432"
      OOAI_PERSISTENCE_INFRA__POSTGRES_DATABASE: ooai_persistence
      OOAI_PERSISTENCE_INFRA__POSTGRES_USER: postgres
      OOAI_PERSISTENCE_INFRA__POSTGRES_PASSWORD: postgres
      OOAI_PERSISTENCE_INFRA__POSTGRES_SSLMODE: disable
    steps:
      - uses: actions/checkout@v5
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.13"
          cache: true
      - run: pdm install -G :all
      - run: pdm run pytest --no-cov tests/e2e/test_postgres_bundle.py -q
      - run: pdm run ooai-persistence smoke --backend postgres --async --json

  package:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.13"
          cache: true
      - run: pdm install -G :all
      - run: pdm build
